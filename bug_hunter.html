<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐜 Bug Hunter Academy</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --py-bg: #0d0f1a;
            --py-surface: #141626;
            --py-border: #252840;
            --py-accent: #3d6fff;
            --py-accent2: #00d4aa;
            --py-text: #e2e6f3;
            --py-muted: #6b7280;
            --css-bg: #fff8f0;
            --css-surface: #ffffff;
            --css-border: #ffd9b3;
            --css-accent: #ff6b2b;
            --css-accent2: #ff3d7f;
            --css-text: #1a0a00;
            --css-muted: #9a6a50
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'DM Sans', sans-serif
        }

        /* VIRTUAL KEYBOARD */
        #virtualKeyboard {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 500;
            background: rgba(13, 15, 26, .98);
            border: 2px solid rgba(61, 111, 255, .3);
            border-radius: 20px;
            padding: 16px;
            backdrop-filter: blur(20px);
            max-width: 100%;
            width: 90%;
            max-width: 900px;
            display: none;
            box-shadow: 0 0 60px rgba(61, 111, 255, .2);
        }

        #virtualKeyboard.show {
            display: block;
            animation: slideUp .3s cubic-bezier(.34, 1.56, .64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .kb-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            font-family: 'Space Mono', monospace;
            font-size: .7rem;
            color: #3d6fff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .kb-mode-toggle {
            display: flex;
            gap: 4px;
        }

        .kb-mode-btn {
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(61, 111, 255, .2);
            background: transparent;
            color: #6b7280;
            font-family: 'Space Mono', monospace;
            font-size: .65rem;
            cursor: pointer;
            transition: all .2s;
        }

        .kb-mode-btn.active {
            background: rgba(61, 111, 255, .15);
            color: #7fa8ff;
            border-color: rgba(61, 111, 255, .4);
        }

        .kb-mode-btn:hover {
            background: rgba(61, 111, 255, .08);
        }

        .kb-close {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, .15);
            color: #6b7280;
            font-family: 'Space Mono', monospace;
            font-size: .65rem;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all .2s;
        }

        .kb-close:hover {
            background: rgba(255, 255, 255, .06);
            color: #fff;
        }

        .kb-rows {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .kb-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .kb-key {
            min-width: 32px;
            height: 40px;
            padding: 0 8px;
            border-radius: 10px;
            border: 1.5px solid rgba(61, 111, 255, .25);
            background: linear-gradient(135deg, rgba(61, 111, 255, .06), rgba(0, 212, 170, .03));
            color: #a8b4d8;
            font-family: 'Space Mono', monospace;
            font-size: .75rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
            user-select: none;
            position: relative;
        }

        .kb-key:hover {
            background: linear-gradient(135deg, rgba(61, 111, 255, .12), rgba(0, 212, 170, .06));
            border-color: rgba(61, 111, 255, .4);
            transform: translateY(-2px);
        }

        .kb-key.selected {
            background: linear-gradient(135deg, #3d6fff, #00d4aa);
            color: #fff;
            border-color: #00d4aa;
            box-shadow: 0 0 20px rgba(61, 111, 255, .4);
            transform: scale(1.08);
        }

        .kb-key.pressed {
            background: linear-gradient(135deg, #00d4aa, #3d6fff);
            transform: scale(0.95);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, .3);
        }

        .kb-key.special {
            flex: 1;
            min-width: 50px;
        }

        .kb-key.space {
            min-width: 200px;
        }

        .kb-key.backspace {
            background: linear-gradient(135deg, rgba(255, 80, 80, .06), rgba(255, 80, 80, .02));
            border-color: rgba(255, 80, 80, .25);
            color: #ff8080;
        }

        .kb-key.backspace:hover {
            background: linear-gradient(135deg, rgba(255, 80, 80, .12), rgba(255, 80, 80, .06));
            border-color: rgba(255, 80, 80, .4);
        }

        .kb-key.enter {
            background: linear-gradient(135deg, rgba(0, 212, 170, .08), rgba(61, 111, 255, .05));
            border-color: rgba(0, 212, 170, .35);
            color: #00d4aa;
            min-width: 60px;
        }

        .kb-key.enter:hover {
            background: linear-gradient(135deg, rgba(0, 212, 170, .15), rgba(61, 111, 255, .1));
            border-color: rgba(0, 212, 170, .5);
        }

        .kb-indicator {
            position: fixed;
            bottom: 250px;
            left: 20px;
            z-index: 499;
            background: rgba(13, 15, 26, .95);
            border: 1px solid rgba(61, 111, 255, .3);
            border-radius: 12px;
            padding: 12px 16px;
            font-family: 'Space Mono', monospace;
            font-size: .7rem;
            color: #7fa8ff;
            display: none;
            backdrop-filter: blur(12px);
            min-width: 160px;
        }

        .kb-indicator.show {
            display: block;
        }

        .kb-indicator-mode {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .kb-indicator-line {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .kb-indicator-label {
            color: #3d5080;
            min-width: 45px;
        }

        .kb-indicator-value {
            color: #00d4aa;
            font-weight: 700;
        }

        /* GESTURE OVERLAY */
        #gestureOverlay {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 9999;
            background: rgba(13, 15, 26, .92);
            border: 1px solid rgba(61, 111, 255, .3);
            border-radius: 16px;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(12px);
            min-width: 140px
        }

        #camCanvas {
            width: 120px;
            height: 90px;
            border-radius: 10px;
            border: 1px solid rgba(61, 111, 255, .2);
            object-fit: cover;
            transform: scaleX(-1)
        }

        #gestureStatus {
            font-family: 'Space Mono', monospace;
            font-size: .65rem;
            color: #7fa8ff;
            text-align: center;
            line-height: 1.4
        }

        #gestureIcon {
            font-size: 1.6rem;
            min-height: 1.8rem
        }

        #gestureToggle {
            font-family: 'Space Mono', monospace;
            font-size: .6rem;
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid rgba(61, 111, 255, .3);
            background: transparent;
            color: #6b7280;
            cursor: pointer;
            margin-top: 2px
        }

        /* GESTURE HINT POPUP */
        #gestureHint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            background: rgba(13, 15, 26, .98);
            border: 2px solid rgba(61, 111, 255, .4);
            border-radius: 20px;
            padding: 28px 32px;
            text-align: center;
            display: none;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 80px rgba(61, 111, 255, .3);
            max-width: 320px;
            width: 90%
        }

        #gestureHint.show {
            display: block;
            animation: popIn .4s cubic-bezier(.34, 1.56, .64, 1)
        }

        .gh-icon {
            font-size: 3.5rem;
            margin-bottom: 8px
        }

        .gh-title {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            background: linear-gradient(135deg, #3d6fff, #00d4aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px
        }

        .gh-sub {
            font-family: 'Space Mono', monospace;
            font-size: .75rem;
            color: #6b7280;
            margin-bottom: 16px
        }

        .gh-bar {
            height: 4px;
            background: rgba(61, 111, 255, .15);
            border-radius: 2px;
            overflow: hidden
        }

        .gh-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3d6fff, #00d4aa);
            transition: width .1s linear
        }

        /* SELECTION TOOLTIP */
        .selection-tooltip {
            position: fixed;
            background: rgba(20, 22, 38, .98);
            border: 1px solid rgba(61, 111, 255, .4);
            border-radius: 12px;
            padding: 14px 18px;
            max-width: 380px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(61, 111, 255, .25);
            backdrop-filter: blur(20px);
            animation: tooltipSlideIn .2s ease-out;
            pointer-events: none
        }

        .selection-tooltip-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: .95rem;
            color: #7fa8ff;
            margin-bottom: 6px
        }

        .selection-tooltip-text {
            font-family: 'Space Mono', monospace;
            font-size: .8rem;
            color: #9aa3b5;
            line-height: 1.5;
            margin-bottom: 8px
        }

        .selection-tooltip-code {
            background: #0a0c14;
            border: 1px solid rgba(61, 111, 255, .2);
            border-radius: 6px;
            padding: 8px 10px;
            color: #00d4aa;
            font-size: .75rem;
            font-weight: 600;
            font-family: 'Space Mono', monospace
        }

        @keyframes tooltipSlideIn {
            from {
                opacity: 0;
                transform: translateY(-8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* GRID & GLOWS */
        .menu-root {
            min-height: 100vh;
            background: #08090f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative
        }

        .menu-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(61, 111, 255, .07) 1px, transparent 1px), linear-gradient(90deg, rgba(61, 111, 255, .07) 1px, transparent 1px);
            background-size: 40px 40px
        }

        .menu-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .35;
            animation: floatGlow 8s ease-in-out infinite
        }

        .menu-glow-1 {
            width: 500px;
            height: 500px;
            background: #3d6fff;
            top: -100px;
            left: -100px
        }

        .menu-glow-2 {
            width: 400px;
            height: 400px;
            background: #ff6b2b;
            bottom: -80px;
            right: -80px;
            animation-delay: -4s
        }

        @keyframes floatGlow {

            0%,
            100% {
                transform: translate(0, 0) scale(1)
            }

            50% {
                transform: translate(20px, 30px) scale(1.08)
            }
        }

        /* MENU CARD */
        .menu-card {
            position: relative;
            z-index: 10;
            background: rgba(20, 22, 38, .85);
            border: 1px solid rgba(61, 111, 255, .25);
            border-radius: 24px;
            padding: 52px 44px;
            max-width: 780px;
            width: 92%;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 80px rgba(61, 111, 255, .12), 0 40px 80px rgba(0, 0, 0, .6)
        }

        .menu-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.2rem, 6vw, 3.8rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, #3d6fff 70%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            line-height: 1
        }

        .menu-sub {
            font-family: 'Space Mono', monospace;
            color: #6b7280;
            font-size: .8rem;
            margin-top: 8px;
            letter-spacing: 2px;
            text-transform: uppercase
        }

        .menu-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(61, 111, 255, .4), transparent);
            margin: 28px 0
        }

        .game-card {
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, .08);
            padding: 24px;
            cursor: pointer;
            transition: all .3s cubic-bezier(.34, 1.56, .64, 1);
            position: relative;
            overflow: hidden
        }

        .game-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity .3s
        }

        .game-card:hover {
            transform: translateY(-4px) scale(1.01)
        }

        .game-card:hover::before {
            opacity: 1
        }

        .game-card:active {
            transform: scale(.98)
        }

        .game-card-py {
            background: linear-gradient(135deg, rgba(61, 111, 255, .1), rgba(0, 212, 170, .05))
        }

        .game-card-py::before {
            background: linear-gradient(135deg, rgba(61, 111, 255, .18), rgba(0, 212, 170, .12))
        }

        .game-card-py:hover {
            border-color: rgba(61, 111, 255, .5);
            box-shadow: 0 8px 32px rgba(61, 111, 255, .2)
        }

        .game-card-css {
            background: linear-gradient(135deg, rgba(255, 107, 43, .1), rgba(255, 61, 127, .05))
        }

        .game-card-css::before {
            background: linear-gradient(135deg, rgba(255, 107, 43, .18), rgba(255, 61, 127, .12))
        }

        .game-card-css:hover {
            border-color: rgba(255, 107, 43, .5);
            box-shadow: 0 8px 32px rgba(255, 107, 43, .2)
        }

        .game-badge {
            font-family: 'Space Mono', monospace;
            font-size: .68rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 10px
        }

        .badge-py {
            background: rgba(61, 111, 255, .2);
            color: #7fa8ff;
            border: 1px solid rgba(61, 111, 255, .3)
        }

        .badge-css {
            background: rgba(255, 107, 43, .2);
            color: #ff9870;
            border: 1px solid rgba(255, 107, 43, .3)
        }

        .game-card-title {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            color: #fff
        }

        .game-card-desc {
            color: #9aa3b5;
            font-size: .88rem;
            margin-top: 6px;
            line-height: 1.5
        }

        .game-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px
        }

        .levels-pill {
            font-family: 'Space Mono', monospace;
            font-size: .72rem;
            color: #6b7280
        }

        .play-btn {
            font-family: 'Syne', sans-serif;
            font-size: .88rem;
            font-weight: 700;
            padding: 9px 22px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all .2s
        }

        .play-btn-py {
            background: linear-gradient(135deg, #3d6fff, #00d4aa);
            color: #fff
        }

        .play-btn-css {
            background: linear-gradient(135deg, #ff6b2b, #ff3d7f);
            color: #fff
        }

        /* GESTURE INDICATOR ON CARD */
        .gesture-label {
            position: absolute;
            top: 12px;
            right: 12px;
            font-family: 'Space Mono', monospace;
            font-size: .65rem;
            padding: 3px 8px;
            border-radius: 8px;
            opacity: .7
        }

        .gesture-label-py {
            background: rgba(61, 111, 255, .15);
            color: #7fa8ff;
            border: 1px solid rgba(61, 111, 255, .2)
        }

        .gesture-label-css {
            background: rgba(255, 107, 43, .15);
            color: #ff9870;
            border: 1px solid rgba(255, 107, 43, .2)
        }

        /* BACK BTN */
        .back-btn {
            font-family: 'Space Mono', monospace;
            font-size: .72rem;
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, .15);
            background: rgba(255, 255, 255, .06);
            color: rgba(255, 255, 255, .6);
            cursor: pointer;
            transition: all .2s;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, .12);
            color: #fff
        }

        /* NAME/MODE SCREEN */
        .nm-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(61, 111, 255, .25);
            border-radius: 14px;
            color: #fff;
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            outline: none;
            transition: border-color .2s;
            text-align: center
        }

        .nm-input:focus {
            border-color: #3d6fff;
            box-shadow: 0 0 0 3px rgba(61, 111, 255, .12)
        }

        .nm-input::placeholder {
            color: #3a3f55
        }

        .mode-card {
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, .06);
            padding: 20px 24px;
            cursor: pointer;
            transition: all .25s;
            position: relative
        }

        .mode-card:hover {
            transform: translateY(-2px)
        }

        .mode-card.selected-timer {
            border-color: #3d6fff;
            background: rgba(61, 111, 255, .1);
            box-shadow: 0 0 20px rgba(61, 111, 255, .15)
        }

        .mode-card.selected-casual {
            border-color: #ffd060;
            background: rgba(255, 208, 96, .07);
            box-shadow: 0 0 20px rgba(255, 208, 96, .1)
        }

        .mode-gesture-label {
            position: absolute;
            bottom: 10px;
            right: 12px;
            font-family: 'Space Mono', monospace;
            font-size: .6rem;
            color: #3d5080
        }

        /* TIMER RING */
        .timer-ring-wrap {
            position: relative;
            width: 72px;
            height: 72px;
            flex-shrink: 0
        }

        .timer-ring-wrap svg {
            transform: rotate(-90deg)
        }

        .timer-number {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 1.1rem
        }

        .timer-danger {
            animation: timerPulse .5s ease-in-out infinite
        }

        @keyframes timerPulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        /* CSS GAME */
        .css-root {
            min-height: 100vh;
            background: var(--css-bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--css-text)
        }

        .css-blob {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
            opacity: .18
        }

        .css-blob-1 {
            width: 400px;
            height: 400px;
            background: #ff6b2b;
            top: -100px;
            right: -100px
        }

        .css-blob-2 {
            width: 300px;
            height: 300px;
            background: #ff3d7f;
            bottom: -60px;
            left: -60px
        }

        .css-header {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, .9);
            border-bottom: 2px solid var(--css-border);
            backdrop-filter: blur(10px);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 20px rgba(255, 107, 43, .08)
        }

        .css-header-title {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #ff6b2b, #ff3d7f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .css-score-pill {
            background: linear-gradient(135deg, #ff6b2b, #ff3d7f);
            color: #fff;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: .95rem;
            padding: 7px 18px;
            border-radius: 999px;
            box-shadow: 0 4px 16px rgba(255, 107, 43, .3)
        }

        .css-progress-bar {
            height: 4px;
            background: rgba(255, 107, 43, .15)
        }

        .css-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b2b, #ff3d7f);
            transition: width .4s cubic-bezier(.34, 1.56, .64, 1)
        }

        .css-main {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
            padding: 28px 18px;
            padding-bottom: 280px;
        }

        .css-card {
            background: #fff;
            border: 2px solid var(--css-border);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 4px 32px rgba(255, 107, 43, .06);
            margin-bottom: 18px
        }

        .css-level-title {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.9rem;
            color: var(--css-text);
            margin-bottom: 4px
        }

        .css-story {
            color: var(--css-muted);
            font-size: 1rem;
            margin-bottom: 18px
        }

        .css-demo-box {
            width: 100%;
            height: 240px;
            border: 2px dashed #ffb899;

        function setupSelectionTooltip() {
            document.addEventListener('mouseup', function () {
                const sel = window.getSelection();
                if (sel.toString().length > 0) {
                    const words = sel.toString().toLowerCase().split(/[\s,;:()[\]{}\./\-\+=!@#$%^&*]+/).filter(w => w.length > 0);
                    const exp = words.map(w => EXPLANATIONS[w]).filter(e => e);
                    if (exp.length > 0) {
                        const r = sel.getRangeAt(0).getBoundingClientRect();
                        showTooltip(sel.toString(), exp[0], r.left + window.scrollX, r.top + window.scrollY - 70);
                    }
                } else { hideTooltip(); }
            });
            document.addEventListener('click', hideTooltip);
        }

        function showTooltip(text, info, x, y) {
            let t = document.getElementById('tooltip');
            if (!t) { t = document.createElement('div'); t.id = 'tooltip'; document.body.appendChild(t); }
            t.className = 'selection-tooltip';
            t.style.display = 'block';
            t.style.left = Math.max(0, x - 190) + 'px';
            t.style.top = Math.max(10, y) + 'px';
            t.innerHTML = `<div class="selection-tooltip-title">${info.title}</div><div class="selection-tooltip-text">${info.text}</div><div class="selection-tooltip-code">💡 "${text}"</div>`;
        }
        function hideTooltip() { const t = document.getElementById('tooltip'); if (t) t.style.display = 'none'; }

        // ─── VIRTUAL KEYBOARD ───
        function initKeyboard() {
            const container = document.getElementById('kbRows');
            const layout = keyboard.layouts[keyboard.mode];
            container.innerHTML = '';

            layout.forEach((row, rowIdx) => {
                const rowEl = document.createElement('div');
                rowEl.className = 'kb-row';

                row.forEach((key, colIdx) => {
                    const btn = document.createElement('button');
                    btn.className = 'kb-key';
                    btn.textContent = key;
                    btn.dataset.key = key;
                    btn.dataset.index = rowIdx * 10 + colIdx;

                    if (key === ' ') btn.className += ' space';
                    if (key === '←') {
                        btn.className += ' backspace';
                        btn.onclick = () => handleBackspace();
                    } else if (key === '→' || key === '↑' || key === '↓') {
                        btn.className += ' special';
                    } else if (key === ' ') {
                        btn.className += ' space';
                        btn.onclick = () => handleKeyInput(' ');
                    } else {
                        btn.onclick = () => handleKeyInput(key.toLowerCase());
                    }

                    rowEl.appendChild(btn);
                });

                // Add enter/backspace row
                if (rowIdx === layout.length - 1) {
                    const backspaceBtn = document.createElement('button');
                    backspaceBtn.className = 'kb-key backspace';
                    backspaceBtn.textContent = '← Zurück';
                    backspaceBtn.onclick = () => handleBackspace();
                    rowEl.appendChild(backspaceBtn);

                    const enterBtn = document.createElement('button');
                    enterBtn.className = 'kb-key enter';
                    enterBtn.textContent = '✓ Enter';
                    enterBtn.onclick = () => handleKeyboardEnter();
                    rowEl.appendChild(enterBtn);
                }

                container.appendChild(rowEl);
            });

            updateKeyboardDisplay();
        }

        function toggleKeyboard() {
            state.useKeyboard = !state.useKeyboard;
            const kb = document.getElementById('virtualKeyboard');
            if (state.useKeyboard) {
                kb.classList.add('show');
                initKeyboard();
            } else {
                kb.classList.remove('show');
            }
        }

        function switchKbMode(mode) {
            keyboard.mode = mode;
            document.querySelectorAll('.kb-mode-btn').forEach(btn => btn.classList.remove('active'));
            const btnMap = { abc: 'kbModeAbc', numbers: 'kbModeNum', special: 'kbModeSpecial' };
            document.getElementById(btnMap[mode]).classList.add('active');
            keyboard.selectedIndex = 0;
            initKeyboard();
        }

        function handleKeyInput(key) {
            const input = document.querySelector('.css-input, .py-textarea, .nm-input');
            if (input) {
                input.value += key;
                input.dispatchEvent(new Event('input', { bubbles: true }));
                state.userAnswer = input.value;
                updateKeyboardDisplay();
            }
        }

        function handleBackspace() {
            const input = document.querySelector('.css-input, .py-textarea, .nm-input');
            if (input && input.value.length > 0) {
                input.value = input.value.slice(0, -1);
                input.dispatchEvent(new Event('input', { bubbles: true }));
                state.userAnswer = input.value;
                updateKeyboardDisplay();
            }
        }

        function handleKeyboardEnter() {
            const input = document.querySelector('.css-input, .py-textarea, .nm-input');
            if (input) {
                const event = new KeyboardEvent('keydown', { key: 'Enter', code: 'Enter', keyCode: 13, which: 13, bubbles: true });
                input.dispatchEvent(event);
            }
        }

        function updateKeyboardDisplay() {
            const keys = document.querySelectorAll('.kb-key');
            keys.forEach((key, idx) => {
                key.classList.remove('selected', 'pressed');
                if (idx === keyboard.selectedIndex) {
                    key.classList.add('selected');
                }
            });
        }

        function selectKeyByPosition(x, y) {
            const keys = document.querySelectorAll('.kb-key');
            let closest = null;
            let minDist = Infinity;

            keys.forEach(key => {
                const rect = key.getBoundingClientRect();
                const keyX = rect.left + rect.width / 2;
                const keyY = rect.top + rect.height / 2;
                const dist = Math.hypot(x - keyX, y - keyY);

                if (dist < minDist) {
                    minDist = dist;
                    closest = key;
                }
            });

            if (closest && minDist < 150) {
                closest.classList.add('selected');
                document.getElementById('kbIndicatorSelected').textContent = closest.textContent;
                return closest;
            }
            return null;
        }

        // ─── MEDIAPIPE HANDS ───
        function countFingers(landmarks) {
            if (!landmarks || landmarks.length < 21) return 0;
            const tips = [8, 12, 16, 20];
            const pips = [6, 10, 14, 18];
            let count = 0;
            for (let i = 0; i < 4; i++) {
                if (landmarks[tips[i]].y < landmarks[pips[i]].y) count++;
            }
            if (landmarks[4].x < landmarks[3].x) count++;
            return count;
        }

        function getPalmPosition(landmarks) {
            if (!landmarks || landmarks.length < 9) return { x: 0, y: 0 };
            const palm = landmarks[9];
            return {
                x: palm.x * window.innerWidth,
                y: palm.y * window.innerHeight
            };
        }

        function drawHand(landmarks, canvasCtx, w, h) {
            const connections = [
                [0, 1], [1, 2], [2, 3], [3, 4],
                [0, 5], [5, 6], [6, 7], [7, 8],
                [5, 9], [9, 10], [10, 11], [11, 12],
                [9, 13], [13, 14], [14, 15], [15, 16],
                [13, 17], [17, 18], [18, 19], [19, 20], [0, 17]
            ];
            canvasCtx.strokeStyle = 'rgba(61,111,255,.8)';
            canvasCtx.lineWidth = 1.5;
            connections.forEach(([a, b]) => {
                const p1 = landmarks[a], p2 = landmarks[b];
                canvasCtx.beginPath();
                canvasCtx.moveTo(p1.x * w, p1.y * h);
                canvasCtx.lineTo(p2.x * w, p2.y * h);
                canvasCtx.stroke();
            });
            landmarks.forEach(p => {
                canvasCtx.beginPath();
                canvasCtx.arc(p.x * w, p.y * h, 2.5, 0, Math.PI * 2);
                canvasCtx.fillStyle = '#00d4aa';
                canvasCtx.fill();
            });
        }

        async function toggleCamera() {
            if (gesture.active) {
                stopCamera();
                return;
            }
            const btn = document.getElementById('gestureToggle');
            const statusEl = document.getElementById('gestureStatus');
            btn.textContent = '⏳ Wird geladen...';
            btn.disabled = true;
            statusEl.textContent = 'Initialisierung...';

            try {
                gesture.video = document.createElement('video');
                gesture.video.setAttribute('playsinline', '');
                const canvas = document.getElementById('camCanvas');
                gesture.ctx = canvas.getContext('2d');

                gesture.hands = new Hands({
                    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
                });
                gesture.hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });
                gesture.hands.onResults(onHandResults);
                await gesture.hands.initialize();

                gesture.camera = new Camera(gesture.video, {
                    onFrame: async () => { await gesture.hands.send({ image: gesture.video }); },
                    width: 160, height: 120
                });
                await gesture.camera.start();

                gesture.active = true;
                btn.textContent = '🚫 Ausschalten';
                btn.disabled = false;
                statusEl.textContent = 'Gesten aktiv';
                document.getElementById('gestureIcon').textContent = '✋';
                document.getElementById('kbIndicator').classList.add('show');
            } catch (e) {
                btn.textContent = '📷 Einschalten';
                btn.disabled = false;
                statusEl.textContent = '❌ Kein Zugriff';
                console.error('Camera error:', e);
            }
        }

        function stopCamera() {
            if (gesture.camera) { gesture.camera.stop(); gesture.camera = null; }
            if (gesture.hands) { gesture.hands.close(); gesture.hands = null; }
            gesture.active = false;
            gesture.video = null;
            const btn = document.getElementById('gestureToggle');
            btn.textContent = '📷 Einschalten';
            document.getElementById('gestureStatus').textContent = 'Kamera aus';
            document.getElementById('gestureIcon').textContent = '✋';
            document.getElementById('kbIndicator').classList.remove('show');
            const canvas = document.getElementById('camCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function onHandResults(results) {
            const canvas = document.getElementById('camCanvas');
            const ctx = gesture.ctx;
            const w = canvas.width, h = canvas.height;

            ctx.save();
            ctx.clearRect(0, 0, w, h);
            ctx.scale(-1, 1);
            ctx.translate(-w, 0);

            if (results.image) {
                ctx.drawImage(results.image, 0, 0, w, h);
            }

            let fingers = 0;
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                drawHand(lm, ctx, w, h);
                fingers = countFingers(lm);

                // Get palm position for keyboard
                const palm = getPalmPosition(lm);
                gesture.palmX = palm.x;
                gesture.palmY = palm.y;

                // Detect fist (0 fingers = closed hand)
                const isFist = fingers === 0 && results.multiHandLandmarks.length > 0;
                if (isFist && !gesture.fistDetected) {
                    gesture.fistDetected = true;
                    gesture.fistStart = Date.now();
                } else if (!isFist) {
                    gesture.fistDetected = false;
                }

                // Handle fist click for keyboard
                if (gesture.fistDetected && Date.now() - gesture.fistStart > keyboard.fistClickDuration) {
                    const selectedKey = selectKeyByPosition(gesture.palmX, gesture.palmY);
                    if (selectedKey && !selectedKey.classList.contains('special')) {
                        selectedKey.classList.add('pressed');
                        const keyText = selectedKey.dataset.key;
                        if (keyText === '← Zurück') handleBackspace();
                        else if (keyText === '✓ Enter') handleKeyboardEnter();
                        else handleKeyInput(keyText.toLowerCase());
                        gesture.fistStart = Date.now() + 300;
                    }
                }
            }
            ctx.restore();

            const icons = ['✊', '☝️', '✌️', '🤟', '🖖', '🖐️'];
            document.getElementById('gestureIcon').textContent = icons[Math.min(fingers, 5)] || '✋';

            const statusEl = document.getElementById('gestureStatus');
            if (fingers > 0) {
                statusEl.textContent = `${fingers} ${fingers === 1 ? 'Finger' : 'Finger'}`;
            } else {
                statusEl.textContent = gesture.fistDetected ? '✊ FAUST' : 'Geste';
            }

            // Update keyboard indicator
            document.getElementById('kbIndicatorFinger').textContent = fingers;
            document.getElementById('kbIndicatorFist').textContent = gesture.fistDetected ? 'JA ✊' : 'nein';

            processGesture(fingers);
        }

        function processGesture(fingers) {
            const now = Date.now();
            const TARGET_FINGERS_MAP = getGestureTargets();
            if (!TARGET_FINGERS_MAP) return;

            const target = TARGET_FINGERS_MAP[fingers];
            if (!target) {
                gesture.holdTarget = null;
                gesture.holdProgress = 0;
                hideGestureHint();
                return;
            }

            if (now - gesture.lastAction < gesture.cooldown) return;

            if (gesture.holdTarget !== fingers) {
                gesture.holdTarget = fingers;
                gesture.holdStart = now;
                gesture.holdProgress = 0;
            }

            const elapsed = now - gesture.holdStart;
            gesture.holdProgress = Math.min(elapsed / gesture.holdDuration, 1);

            showGestureHintProgress(target, gesture.holdProgress);

            if (gesture.holdProgress >= 1) {
                gesture.lastAction = now;
                gesture.holdTarget = null;
                gesture.holdProgress = 0;
                hideGestureHint();
                executeGestureAction(target);
            }
        }

        // ─── TIMER RING ───
        function createTimerRing(seconds, maxSeconds = TIMER_MAX) {
            const r = 28, circ = 2 * Math.PI * r;
            const pct = seconds / maxSeconds;
            const color = seconds > 60 ? '#00d4aa' : seconds > 30 ? '#ffd060' : '#ff5555';
            const dash = circ * pct;
            const isDanger = seconds <= 10;
            return `<div class="timer-ring-wrap">
    <svg width="72" height="72" viewBox="0 0 72 72">
      <circle cx="36" cy="36" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="5"/>
      <circle cx="36" cy="36" r="${r}" fill="none" stroke="${color}" stroke-width="5"
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round" style="transition:stroke-dasharray .5s linear,stroke .5s"/>
    </svg>
    <div class="timer-number${isDanger ? ' timer-danger' : ''}" style="color:${color};font-size:${isDanger ? '1.3rem' : '1.05rem'}">
      ${Math.floor(seconds / 60)}:${String(seconds % 60).padStart(2, '0')}
    </div>
  </div>`;
        }

            const base = 'left:10px;top:10px;right:auto;bottom:auto;width:44px;height:44px;background:#8B4513;border-radius:50%;box-shadow:0 4px 12px rgba(139,69,19,.3);opacity:1;transform:rotate(0deg);';
            const ua = userAnswer;
            if (level.demoType === 'left') return base.replace('left:10px', ua.includes('left') ? 'left:50px' : 'left:200px');
            if (level.demoType === 'right') return base.replace('left:10px;top:10px;right:auto;', ua.includes('right') ? 'right:50px;left:auto;top:10px;' : 'right:10px;left:auto;top:10px;');
            if (level.demoType === 'top') return base.replace('top:10px', ua.includes('top') ? 'top:50px' : 'top:185px');
            if (level.demoType === 'bottom') return base.replace('bottom:auto;top:10px', ua.includes('bottom') ? 'bottom:50px;top:auto' : 'bottom:10px;top:auto');
            if (level.demoType === 'size-color') {
                const w = ua.includes('width') ? '80px' : '44px';
                const bg = ua.includes('red') ? '#ff4422' : '#8B4513';
                return base.replace('width:44px;height:44px;background:#8B4513', `width:${w};height:${w};background:${bg}`);

            if (level.demoType === 'circle') return base.replace('border-radius:50%', ua.includes('border-radius') ? 'border-radius:50%' : 'border-radius:6px');

            return base;

        function getCorrectPyAnswerText(level) {
            if (level.type === 'Ordne') return `Richtige Reihenfolge: ${level.correctOrder.join(', ')}`;
            if (level.type === 'Finde') return `Überflüssige Variable: "${level.correctAnswer}"`;
            return `Richtige Antwort: ${level.correctAnswer}`;
        }

        function validatePyAnswer(level, ans) {
            const a = ans.trim();
            if (level.type === 'Ordne') {
                const nums = a.match(/\d+/g);
                if (!nums) return false;
                const parsed = nums.map(Number).filter(n => n >= 0 && n < level.correctOrder.length);
                const seen = new Set();
                const filtered = parsed.filter(n => { if (seen.has(n)) return false; seen.add(n); return true; });
                return filtered.length === level.correctOrder.length && JSON.stringify(filtered) === JSON.stringify(level.correctOrder);
            }
            if (level.type === 'Finde') return new RegExp('\\b' + level.correctAnswer + '\\b', 'i').test(a);
            if (level.type === 'Fix') {
                const ca = level.correctAnswer;
                if (a === ca) return true;
                if (ca === '()' && /^print\s*\(.*\)/.test(a)) return true;
                if (ca === ':' && a.endsWith(':')) return true;
                if (ca === ']' && a.includes(']')) return true;
                if (a.includes(ca)) return true;
            }
            return false;
        }

        function startTimer() {
            if (state.timerMode && state.gameState === 'playing') {
                state.timerRef = setInterval(() => {
                    state.timeLeft--;

        function handleTimeout() { state.levelTimes.push(TIMER_MAX); completeLevel(0, true); }

        function completeLevel(overridePts, timeout = false) {

                if (!state.timerMode) pts = state.hintsUsed === 0 ? 100 : 50;

                startTimer(); render();

        }

        async function finishGame() {
            clearInterval(state.timerRef);
            const allTimes = [...state.levelTimes, Math.round((Date.now() - state.levelStartTime) / 1000)];
            const totalTime = allTimes.reduce((a, b) => a + b, 0);

        function backToMenu() {
            clearInterval(state.timerRef);
            Object.assign(state, { screen: 'menu', gameMode: null, gameState: 'menu', currentLevel: 0, score: 0, userAnswer: '', feedback: '', showHint: false, hintsUsed: 0, usedReveal: false, showAnswer: false, timeLeft: TIMER_MAX, levelTimes: [], finalStats: null, rankInfo: null, useKeyboard: false });
            document.getElementById('virtualKeyboard').classList.remove('show');
            render();
        }

        function goLeaderboard() { state.screen = 'leaderboard'; render(); }
        function toggleHint() { state.showHint = !state.showHint; if (state.showHint) state.hintsUsed++; render(); }
        function toggleAnswer() { state.showAnswer = !state.showAnswer; render(); }
        function revealAnswer() { state.usedReveal = true; completeLevel(0); }
        function updatePlayerName(name) { state.playerName = name; }
        function switchMode(timerMode) { state.timerMode = timerMode; render(); }
        function updateAnswer(answer) { state.userAnswer = answer; }

        // ─── INIT ───
        setupSelectionTooltip();
        render();
    </script>
</body>

</html>
