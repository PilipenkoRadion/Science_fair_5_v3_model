                    <div className="py-header">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '14px' }}>
                            <button className="back-btn" onClick={onBack}><ArrowLeft /> Menü</button>
                            <div><div className="py-header-title">🐍 Python</div><div style={{ fontFamily: "'Space Mono',monospace", fontSize: '.65rem', color: '#3d5080' }}>Lv {currentLevel + 1}/10 · {playerName}</div></div>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                            {timerMode && <TimerRing seconds={timeLeft} />}
                            <div className="py-score-pill">🌾 {score}</div>
                        </div>
                    </div>
                    <div className="py-progress-bar"><div className="py-progress-fill" style={{ width: `${((currentLevel + 1) / 10) * 100}%` }} /></div>
                    <div className="py-main">
                        <div className="py-card slide-up">
                            <div><span className={`py-type-badge ${typeBadgeClass}`}>{lv.type}</span></div>
                            <div style={{ fontFamily: "'Space Mono',monospace", fontSize: '.68rem', color: '#6b7280', marginBottom: '5px' }}>{lv.difficulty}</div>
                            <div className="py-level-title">{lv.title}</div>
                            <div className="py-story">{lv.story}</div>
                            {lv.code && <div className="py-code-block">{lv.code}{lv.error && <div className="py-error-line">💥 FEHLER:\n{lv.error}</div>}</div>}
                            {lv.codeLines && <div className="py-lines-box">
                                <div style={{ fontFamily: "'Space Mono',monospace", fontSize: '.68rem', color: '#3d6fff', marginBottom: '10px', textTransform: 'uppercase', letterSpacing: '1px' }}>📋 Code-Zeilen:</div>
                                {lv.codeLines.map((line, idx) => <div key={idx} className="py-line-item"><span className="py-line-num">{idx}</span>{line || '(leer)'}</div>)}
                            </div>}
                            {!showHint && <button className="py-hint-btn" onClick={() => { setShowHint(true); setHintsUsed(h => h + 1); }}><HelpCircle /> Tipp (−50%)</button>}
                            {showHint && (
                                <div style={{ marginBottom: '14px' }}>
                                    <div className="py-hint-box" style={{ marginBottom: '9px' }}>
                                        <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: '700', fontSize: '.75rem', color: '#7fa8ff', marginBottom: '5px', letterSpacing: '1px', textTransform: 'uppercase' }}>💡 Tipp</div>
                                        <div style={{ marginBottom: '9px' }}>{lv.hint}</div>
                                        <div style={{ borderTop: '1px solid rgba(61,111,255,.15)', paddingTop: '9px', color: '#9aa3b5', fontSize: '.8rem' }}><span style={{ color: '#00d4aa', fontWeight: '600' }}>📚 Erklärung:</span> {lv.explanation}</div>
                                    </div>
                                    {!showAnswer && !usedReveal && (
                                        <button onClick={() => setShowAnswer(true)} style={{ width: '100%', background: 'rgba(255,80,80,.06)', border: '1px solid rgba(255,80,80,.2)', color: '#ff8080', fontFamily: "'Syne',sans-serif", fontWeight: '700', fontSize: '.83rem', padding: '10px', borderRadius: '10px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px' }}>
                                            👁 Richtige Antwort zeigen <span style={{ fontFamily: "'Space Mono',monospace", fontSize: '.72rem', opacity: .7 }}>(0 Punkte)</span>
                                        </button>
                                    )}
                                    {showAnswer && !usedReveal && (
                                        <div>
                                            <div style={{ background: 'rgba(0,212,170,.07)', border: '1px solid rgba(0,212,170,.25)', borderRadius: '10px', padding: '14px 16px', marginBottom: '10px' }}>
                                                <div style={{ fontFamily: "'Space Mono',monospace", fontSize: '.68rem', color: '#00d4aa', marginBottom: '6px', textTransform: 'uppercase', letterSpacing: '1px' }}>✅ Richtige Antwort:</div>
                                                <div style={{ fontFamily: "'Space Mono',monospace", fontSize: '1rem', color: '#fff', fontWeight: 700 }}>{getCorrectAnswerText(lv)}</div>
                                            </div>
                                            <button onClick={revealAnswer} style={{ width: '100%', background: 'linear-gradient(135deg,rgba(0,212,170,.15),rgba(61,111,255,.1))', border: '1px solid rgba(0,212,170,.35)', color: '#00d4aa', fontFamily: "'Syne',sans-serif", fontWeight: '700', fontSize: '.9rem', padding: '12px', borderRadius: '10px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px' }}>
                                                ✅ Verstanden — WEITER <span style={{ fontFamily: "'Space Mono',monospace", fontSize: '.72rem', opacity: .7 }}>(0 Punkte)</span>
                                            </button>
                                        </div>
                                    )}
                                </div>
                            )}
                            <div style={{ marginBottom: '7px', fontFamily: "'Space Mono',monospace", fontSize: '.72rem', color: '#6b7280' }}>
                                {lv.type === 'Ordne' ? '📝 Reihenfolge (z.B. 1,0 oder 2,3,0,1):' : '📝 Deine Antwort:'}
                            </div>
                            <textarea className="py-textarea" value={userAnswer} onChange={e => setUserAnswer(e.target.value)} placeholder="Antwort hier..." rows="3" />
                            {feedback && (fbType === 'ok' ? <div className="py-feedback-ok">✅ {fbMsg}</div> : <div className="py-feedback-err">❌ {fbMsg}</div>)}
                            <div style={{ display: 'flex', gap: '12px' }}>
                                <button className="py-btn-primary" onClick={checkAnswer}>✅ Prüfen</button>
                                <button className="py-btn-secondary" onClick={resetGame}>🔄 Neu</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (gameState === 'levelComplete') return (
                <div className="py-menu-root">
                    <div className="menu-glow menu-glow-1" style={{ opacity: .15 }} />
                    <div className="menu-glow menu-glow-2" style={{ background: '#00d4aa', opacity: .1 }} />
                    <div className="py-menu-card pop-in" style={{ textAlign: 'center', position: 'relative', zIndex: 2 }}>
                        <div style={{ fontSize: '4.5rem' }} className="bounce">{usedReveal ? '📖' : '🎉'}</div>
                        <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: '2.5rem', background: usedReveal ? 'linear-gradient(135deg,#ff8080,#ff4444)' : 'linear-gradient(135deg,#3d6fff,#00d4aa)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', margin: '8px 0' }}>
                            {usedReveal ? 'GELÖST!' : 'RICHTIG!'}
                        </div>
                        {usedReveal && <div style={{ background: 'rgba(255,80,80,.06)', border: '1px solid rgba(255,80,80,.2)', borderRadius: '10px', padding: '10px 14px', margin: '0 0 12px', fontSize: '.8rem', color: '#ff9999', fontFamily: "'Space Mono',monospace" }}>Antwort gezeigt — 0 Punkte</div>}
                        <div style={{ background: 'rgba(61,111,255,.06)', border: '1px solid rgba(61,111,255,.2)', borderRadius: '12px', padding: '16px', margin: '14px 0', textAlign: 'left' }}>
                            <div style={{ fontWeight: '700', color: '#7fa8ff', marginBottom: '5px' }}>📚 Gelernt:</div>
                            <div style={{ color: '#9aa3b5', fontSize: '.9rem' }}>{lv.explanation}</div>
                        </div>
                        <button className="py-btn-primary" style={{ width: '100%', fontSize: '1.05rem' }} onClick={nextLevel}>{currentLevel < levels.length - 1 ? '🐜 WEITER →' : '🏆 FINALE!'}</button>
                    </div>
                </div>
            );

            const stars = score >= 900 ? 5 : score >= 800 ? 4 : score >= 700 ? 3 : score >= 600 ? 2 : 1;
            return (
                <div className="py-menu-root" style={{ background: 'linear-gradient(135deg,#0a0c18,#0d1a30)' }}>
                    {showStats && finalStats && <StatsOverlay stats={finalStats} rank={rankInfo?.rank} total={rankInfo?.total} onClose={() => setShowStats(false)} />}
                    <div className="py-menu-card pop-in" style={{ textAlign: 'center', position: 'relative', zIndex: 2 }}>
                        <div style={{ fontSize: '4.5rem', marginBottom: '6px' }}>👑</div>
                        <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: '2.2rem', background: 'linear-gradient(135deg,#3d6fff,#00d4aa)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>PYTHON MEISTER!</div>
                        <div className="final-stars">{'⭐'.repeat(stars)}</div>
                        <div style={{ fontFamily: "'Space Mono',monospace", fontSize: '2.2rem', color: '#3d6fff', margin: '14px 0' }}>🌾 {score}</div>
                        {finalStats && <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', marginBottom: '18px' }}>
                            <div style={{ background: 'rgba(61,111,255,.08)', border: '1px solid rgba(61,111,255,.15)', borderRadius: '10px', padding: '12px' }}><div style={{ fontSize: '.68rem', color: '#3d5080', fontFamily: "'Space Mono',monospace" }}>PROZENT</div><div style={{ fontSize: '1.3rem', fontWeight: 700, color: '#7fa8ff' }}>{finalStats.percent}%</div></div>
                            <div style={{ background: 'rgba(61,111,255,.08)', border: '1px solid rgba(61,111,255,.15)', borderRadius: '10px', padding: '12px' }}><div style={{ fontSize: '.68rem', color: '#3d5080', fontFamily: "'Space Mono',monospace" }}>Ø ZEIT</div><div style={{ fontSize: '1.3rem', fontWeight: 700, color: '#00d4aa' }}>{finalStats.avgTime}s</div></div>
                        </div>}
                        {rankInfo && <div style={{ padding: '12px', background: 'rgba(61,111,255,.08)', border: '1px solid rgba(61,111,255,.2)', borderRadius: '10px', marginBottom: '16px', fontFamily: "'Space Mono',monospace", fontSize: '.85rem', color: '#7fa8ff' }}>🏆 Platz <strong style={{ color: '#ffd060' }}>#{rankInfo.rank}</strong> von {rankInfo.total}</div>}
                        <div style={{ display: 'flex', gap: '12px' }}>
                            <button className="py-btn-primary" onClick={resetGame}>🔄 Nochmal</button>
                            <button className="py-btn-secondary" onClick={onBack}>🏠 Menü</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ══════════════════════════════════════════════════════════
        //  NAME + MODE SCREEN
        // ══════════════════════════════════════════════════════════
        const NameModeScreen = ({ onStart }) => {
            const [name, setName] = useState('');
            const [mode, setMode] = useState('timer');
            const [game, setGame] = useState(null); // 'python' | 'css'
            const canStart = name.trim().length >= 2;

            if (game) return (
                <div className="menu-root">
                    <div className="menu-grid" />
                    <div className="menu-glow menu-glow-1" /><div className="menu-glow menu-glow-2" />
                    <div className="menu-card slide-up" style={{ maxWidth: '640px' }}>
                        <button className="back-btn" style={{ marginBottom: '24px' }} onClick={() => setGame(null)}><ArrowLeft /> Zurück</button>
                        <div style={{ fontSize: '3rem', marginBottom: '8px' }}>{game === 'python' ? '🐍' : '🎨'}</div>
                        <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: '2rem', background: game === 'python' ? 'linear-gradient(135deg,#3d6fff,#00d4aa)' : 'linear-gradient(135deg,#ff6b2b,#ff3d7f)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: '6px' }}>
                            {game === 'python' ? 'Python Edition' : 'CSS Edition'}
                        </div>
                        <div style={{ fontFamily: "'Space Mono',monospace", fontSize: '.75rem', color: '#3d5080', marginBottom: '24px', letterSpacing: '1px' }}>SPIELER & MODUS WÄHLEN</div>

                        <div style={{ marginBottom: '20px' }}>
                            <div style={{ fontFamily: "'Space Mono',monospace", fontSize: '.72rem', color: '#6b7280', marginBottom: '10px', textTransform: 'uppercase', letterSpacing: '1px' }}>Dein Name</div>
                            <input className="nm-input" value={name} onChange={e => setName(e.target.value)} placeholder="Name eingeben..." maxLength={20}
                                onKeyDown={e => e.key === 'Enter' && canStart && onStart({ game, name: name.trim(), timerMode: mode === 'timer' })} />
                        </div>

                        <div style={{ fontFamily: "'Space Mono',monospace", fontSize: '.72rem', color: '#6b7280', marginBottom: '10px', textTransform: 'uppercase', letterSpacing: '1px' }}>Modus</div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '28px' }}>
                            <div className={`mode-card ${mode === 'timer' ? 'selected-timer' : ''}`} onClick={() => setMode('timer')} style={{ border: `2px solid ${mode === 'timer' ? '#3d6fff' : 'rgba(255,255,255,.06)'}` }}>
                                <div style={{ fontSize: '1.8rem', marginBottom: '6px' }}>⏱</div>
                                <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: '1rem', color: '#fff', marginBottom: '4px' }}>Timer</div>
                                <div style={{ fontSize: '.78rem', color: '#6b7280', lineHeight: 1.4 }}>3 Min pro Level. Score hängt von der Zeit ab. Ranglisten-Eintrag!</div>
                                {mode === 'timer' && <div style={{ position: 'absolute', top: '10px', right: '10px', width: '8px', height: '8px', borderRadius: '50%', background: '#3d6fff', boxShadow: '0 0 8px #3d6fff' }} />}
                            </div>
                            <div className={`mode-card ${mode === 'casual' ? 'selected-casual' : ''}`} onClick={() => setMode('casual')} style={{ border: `2px solid ${mode === 'casual' ? '#ffd060' : 'rgba(255,255,255,.06)'}` }}>
                                <div style={{ fontSize: '1.8rem', marginBottom: '6px' }}>🎮</div>
                                <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: '1rem', color: '#fff', marginBottom: '4px' }}>Casual</div>
                                <div style={{ fontSize: '.78rem', color: '#6b7280', lineHeight: 1.4 }}>Kein Zeitdruck. Lernen ohne Stress. Kein Ranglisten-Eintrag.</div>
                                {mode === 'casual' && <div style={{ position: 'absolute', top: '10px', right: '10px', width: '8px', height: '8px', borderRadius: '50%', background: '#ffd060', boxShadow: '0 0 8px #ffd060' }} />}
                            </div>
                        </div>

                        {!canStart && <div style={{ fontFamily: "'Space Mono',monospace", fontSize: '.72rem', color: '#ff8080', marginBottom: '12px', textAlign: 'center' }}>⚠ Mindestens 2 Zeichen für den Namen</div>}
                        <button
                            onClick={() => canStart && onStart({ game, name: name.trim(), timerMode: mode === 'timer' })}
                            style={{
                                width: '100%', padding: '16px', borderRadius: '14px', border: 'none', cursor: canStart ? 'pointer' : 'not-allowed', fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: '1.1rem', transition: 'all .2s',
                                background: canStart ? (game === 'python' ? 'linear-gradient(135deg,#3d6fff,#00d4aa)' : 'linear-gradient(135deg,#ff6b2b,#ff3d7f)') : 'rgba(255,255,255,.05)',
                                color: canStart ? '#fff' : '#3d5080', opacity: canStart ? 1 : .5,
                                boxShadow: canStart ? '0 4px 24px rgba(61,111,255,.3)' : 'none'
                            }}>
                            {canStart ? `🚀 SPIELEN ALS ${name.trim().toUpperCase()}` : 'Name eingeben...'}
                        </button>
                    </div>
                </div>
            );

            // Game selection
            return (
                <div className="menu-root">
                    <div className="menu-grid" />
                    <div className="menu-glow menu-glow-1" /><div className="menu-glow menu-glow-2" />
                    <div className="menu-card slide-up">
                        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
                            <div>
                                <div className="menu-title">🐜 Bug Hunter</div>
                                <div className="menu-sub">Academy — choose your track</div>
                            </div>
                        </div>
                        <div className="menu-divider" />
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
                            <div className="game-card game-card-py" onClick={() => setGame('python')}>
                                <div className="game-badge badge-py">10 Levels</div>
                                <div className="game-card-title">🐍 Python Edition</div>
                                <div className="game-card-desc">Fix Syntax-Fehler, finde überflüssige Variablen und ordne Code-Zeilen. Echter Debugging-Spaß!</div>
                                <div className="game-card-footer">
                                    <span className="levels-pill">Fix · Finde · Ordne</span>
                                    <button className="play-btn play-btn-py">Spielen →</button>
                                </div>
                            </div>
                            <div className="game-card game-card-css" onClick={() => setGame('css')}>
                                <div className="game-badge badge-css">10 Levels</div>
                                <div className="game-card-title">🎨 CSS Edition</div>
                                <div className="game-card-desc">Bewege eine Ameise mit CSS-Properties — von left/right/top bis zu transform und box-shadow.</div>
                                <div className="game-card-footer">
                                    <span className="levels-pill">Interaktive Demo · Visuell</span>
                                    <button className="play-btn play-btn-css">Spielen →</button>
                                </div>
                            </div>
                        </div>
                        <div style={{ marginTop: '20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            <div style={{ fontSize: '.75rem', fontFamily: "'Space Mono',monospace", color: '#3a3f55' }}>⏱ Timer · 🌾 Score · 🏆 Rangliste</div>
                            <button onClick={() => onStart({ game: 'leaderboard' })} style={{ background: 'transparent', border: '1px solid rgba(255,255,255,.1)', color: '#6b7280', fontFamily: "'Space Mono',monospace", fontSize: '.72rem', padding: '7px 14px', borderRadius: '8px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '6px', transition: 'all .2s' }}
                                onMouseEnter={e => { e.currentTarget.style.borderColor = 'rgba(255,215,0,.3)'; e.currentTarget.style.color = '#ffd060'; }}
                                onMouseLeave={e => { e.currentTarget.style.borderColor = 'rgba(255,255,255,.1)'; e.currentTarget.style.color = '#6b7280'; }}>
                                <Trophy size={14} /> Rangliste
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ══════════════════════════════════════════════════════════
        //  APP ROOT
        // ══════════════════════════════════════════════════════════
        const App = () => {
            const [screen, setScreen] = useState('menu');
            const [playerName, setPlayerName] = useState('');
            const [timerMode, setTimerMode] = useState(true);

            const handleStart = ({ game, name, timerMode: tm }) => {
                if (game === 'leaderboard') { setScreen('leaderboard'); return; }
                setPlayerName(name); setTimerMode(tm); setScreen(game);
            };

            if (screen === 'leaderboard') return <Leaderboard onBack={() => setScreen('menu')} highlightName={playerName} />;
            if (screen === 'css') return <CssGame onBack={() => setScreen('menu')} playerName={playerName} timerMode={timerMode} />;
            if (screen === 'python') return <PythonGame onBack={() => setScreen('menu')} playerName={playerName} timerMode={timerMode} />;
            return <NameModeScreen onStart={handleStart} />;
        };

        ReactDOM.render(<App />, document.getElementById('root'));

        // ════════════════════════════════════════════════════════
        //  GESTURE CONTROLLER INTEGRATION
        //  Listens for postMessage from gesture_controller.html
        // ════════════════════════════════════════════════════════
        (function () {
            // Store reference to active input/textarea
            let activeInput = null;

            // Track the focused input
            document.addEventListener('focusin', e => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')
                    activeInput = e.target;
            });
            document.addEventListener('focusout', e => {
                setTimeout(() => { if (document.activeElement !== activeInput) activeInput = null; }, 100);
            });

            window.addEventListener('message', e => {
                const d = e.data;
                if (!d || !d.type) return;

                // ── Typing into focused input ──────────────────────
                if (d.type === 'gesture_type' && activeInput) {
                    const nativeInputValueSetter = Object.getOwnPropertyDescriptor(
                        window.HTMLInputElement.prototype, 'value') ||
                        Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value');
                    if (nativeInputValueSetter) {
                        nativeInputValueSetter.set.call(activeInput, d.text);
                        activeInput.dispatchEvent(new Event('input', { bubbles: true }));
                    }
                }

                // ── Enter / confirm ────────────────────────────────
                if (d.type === 'gesture_confirm') {
                    if (activeInput) {
                        activeInput.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', bubbles: true }));
                    }
                    // Click focused button if any
                    const btn = document.querySelector('button:focus');
                    if (btn) btn.click();
                }

                // ── Navigation ─────────────────────────────────────
                if (d.type === 'gesture_nav') {
                    if (d.dir === 'back') {
                        const backBtn = document.querySelector('.back-btn');
                        if (backBtn) { backBtn.click(); showGestureToast('← Zurück'); }
                    }
                    if (d.dir === 'forward') {
                        // Try to click the main primary action button
                        const primary = document.querySelector('.py-btn-primary, .css-btn-primary');
                        if (primary) { primary.click(); showGestureToast('→ Weiter'); }
                    }
                }

                // ── Mode selection ─────────────────────────────────
                if (d.type === 'gesture_mode') {
                    showGestureToast(d.mode === 'timer' ? '⏱ Timer gewählt' : '🎮 Casual gewählt');
                }
            });

            // ── Toast notification ─────────────────────────────
            function showGestureToast(msg) {
                let toast = document.getElementById('gesture-toast');
                if (!toast) {
                    toast = document.createElement('div');
                    toast.id = 'gesture-toast';
                    Object.assign(toast.style, {
                        position: 'fixed', top: '20px', left: '50%', transform: 'translateX(-50%)',
                        background: 'rgba(20,22,38,.95)', border: '1px solid rgba(61,111,255,.3)',
                        borderRadius: '12px', padding: '10px 24px', fontFamily: "'Space Mono',monospace",
                        fontSize: '.8rem', color: '#00d4aa', zIndex: '99999', transition: 'opacity .3s',
                        pointerEvents: 'none', boxShadow: '0 8px 32px rgba(0,0,0,.4)',
                        backdropFilter: 'blur(20px)'
                    });
                    document.body.appendChild(toast);
                }
                toast.textContent = '🖐 ' + msg;
                toast.style.opacity = '1';
                clearTimeout(toast._t);
                toast._t = setTimeout(() => toast.style.opacity = '0', 2000);
            }

            // ── Gesture Controller Launcher button ─────────────
            const launchBtn = document.createElement('button');
            launchBtn.id = 'gesture-launch';
            launchBtn.innerHTML = '🖐';
            launchBtn.title = 'Gesture Controller öffnen';
            Object.assign(launchBtn.style, {
                position: 'fixed', bottom: '20px', left: '20px', zIndex: '9998',
                width: '52px', height: '52px', borderRadius: '50%',
                background: 'rgba(20,22,38,.9)', border: '1px solid rgba(61,111,255,.3)',
                color: '#fff', fontSize: '1.4rem', cursor: 'pointer',
                boxShadow: '0 4px 20px rgba(61,111,255,.2)', transition: 'all .2s',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                backdropFilter: 'blur(10px)'
            });
            launchBtn.addEventListener('mouseenter', () => {
                launchBtn.style.background = 'rgba(61,111,255,.2)';
                launchBtn.style.boxShadow = '0 6px 28px rgba(61,111,255,.4)';
                launchBtn.style.transform = 'scale(1.1)';
            });
            launchBtn.addEventListener('mouseleave', () => {
                launchBtn.style.background = 'rgba(20,22,38,.9)';
                launchBtn.style.boxShadow = '0 4px 20px rgba(61,111,255,.2)';
                launchBtn.style.transform = 'scale(1)';
            });
            launchBtn.addEventListener('click', () => {
                window.open('gesture_controller.html', 'gesture', 'width=700,height=650,resizable=yes');
                showGestureToast('Gesture Controller geöffnet!');
            });
            document.body.appendChild(launchBtn);
        })();

    </script>
</body>
